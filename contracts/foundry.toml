[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
# Match scripts/deploy-qr-contracts.mjs (solc 0.8.35, optimizer 200 runs, viaIR)
# so the tested bytecode equals the deployed bytecode. viaIR is also required:
# QrPaymentSettlement.settle hits "stack too deep" without it.
solc = "0.8.35"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 128
depth = 24
fail_on_revert = false

# Heavier exploration in CI: run with FOUNDRY_PROFILE=ci. Inherits src/solc/viaIR
# from the default profile; only the fuzz/invariant budgets are overridden.
[profile.ci.fuzz]
runs = 512

[profile.ci.invariant]
runs = 256
depth = 32
fail_on_revert = false

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c0e12" />
    <meta name="description" content="Disburse - Non-custodial payment console for Arc Testnet." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>Disburse - Arc Testnet Payment Console</title>
    <script>
      (() => {
        const stored = localStorage.getItem("disburse.theme") ?? localStorage.getItem("arc-pay-desk.theme");
        const theme = stored === "light" || stored === "dark" ? stored : "dark";
        document.documentElement.dataset.theme = theme;
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", theme === "dark" ? "#0c0e12" : "#f8f9fb");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
